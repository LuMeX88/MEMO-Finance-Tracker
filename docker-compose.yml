version: '3.9'

services:
  backend:
    build:
      context: ./memo-finance-tracker/backend
      dockerfile: Dockerfile
    container_name: ha-budgeting-backend
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/budgeting.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./memo-finance-tracker/frontend
      dockerfile: Dockerfile
    container_name: ha-budgeting-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
