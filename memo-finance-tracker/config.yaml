name: "MEMO – Finance Tracker"
version: "1.2.1"
slug: "memo_finance_tracker"
description: "Local-first personal finance tracker with Home Assistant ingress and MQTT sensors"
url: "https://github.com/LuMeX88/MEMO-Finance-Tracker"
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:cash-multiple
panel_title: "MEMO – Finance Tracker"
services:
  - mqtt:want
map:
  - data:rw
options:
  ai_enabled: true
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_base_topic: "memo"
  mqtt_discovery_prefix: "homeassistant"
  mqtt_currency: "€"
  mqtt_publish_interval: 300
schema:
  ai_enabled: bool
  mqtt_host: str
  mqtt_port: port
  mqtt_username: "str?"
  mqtt_password: "password?"
  mqtt_base_topic: str
  mqtt_discovery_prefix: str
  mqtt_currency: str
  mqtt_publish_interval: int(10,)
