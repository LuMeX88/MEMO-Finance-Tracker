# Uvicorn logging configuration — adds timestamps to every log line so the
# add-on log is readable and consistent (uvicorn's default format has none).
# Passed via `uvicorn --log-config`. The timestamp format matches HA's bashio
# style (HH:MM:SS) but also includes the date for clarity.
version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "[%(asctime)s] %(levelname)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  access:
    format: "[%(asctime)s] %(levelname)s: %(client_addr)s - \"%(request_line)s\" %(status_code)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  default:
    class: logging.StreamHandler
    formatter: default
    stream: ext://sys.stderr
  access:
    class: logging.StreamHandler
    formatter: access
    stream: ext://sys.stdout

loggers:
  uvicorn:
    level: INFO
    handlers: [default]
    propagate: false
  uvicorn.error:
    level: INFO
    handlers: [default]
    propagate: false
  uvicorn.access:
    level: INFO
    handlers: [access]
    propagate: false
  # Application loggers (main, AI, OCR, MQTT) inherit the timestamped handler.
  memo:
    level: INFO
    handlers: [default]
    propagate: false

root:
  level: INFO
  handlers: [default]
